# Minimal Nginx config for static Next.js app
worker_processes auto;

# Store PID in /tmp (always writable)
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Determine if URL needs trailing slash redirect
    # Match: /auth, /auth/login (no extension, no trailing slash, not root)
    map "$uri" $should_redirect {
        "~^/[^./]+(/[^./]+)*$"  1;  # /auth or /auth/login (no extension, no trailing slash)
        default                  0;
    }

    # Disable logging to avoid permission issues
    access_log /dev/stdout;
    error_log  /dev/stderr info;

    # Optimize static file serving
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    server {
        listen       3000;
        server_name  localhost;

        # Serve static files
        root /usr/share/nginx/html;
        index index.html;

        # Redirect /auth/login -> /auth/login/ (no extension, no trailing slash)
        location / {
            # Use X-Forwarded-Proto from Cloudflare if available, otherwise use current scheme
            set $redirect_scheme $scheme;
            if ($http_x_forwarded_proto != "") {
                set $redirect_scheme $http_x_forwarded_proto;
            }

            # Apply redirect if should_redirect=1 - use $http_host to preserve port
            if ($should_redirect = 1) {
                return 301 $redirect_scheme://$http_host$uri/;
            }

            # Check for file, then index.html in directory
            try_files $uri $uri/index.html =404;
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:5050/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve Next.js static assets
        location ~ ^/_next/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Optional 404 handling
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
    }
}
